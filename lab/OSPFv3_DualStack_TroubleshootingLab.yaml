    configuration:
      - name: ios_config.txt
        content: |-
          !
          ! R1-ABR  |  Area 0 + Area 1 ABR
          ! FAULTS: #1 OSPFv3 process-id mismatch (uses 2 on G0/1 instead of 1)
          !         #2 IPv6 unicast-routing NOT enabled (missing command)
          !
          hostname R1-ABR
          !
          ! FAULT #2: ipv6 unicast-routing is intentionally omitted
          !
          ip routing
          !
          interface Loopback0
           ip address 1.1.1.1 255.255.255.255
           ipv6 address 2001:db8:0:1::1/128
           ipv6 ospf 1 area 0
           no shutdown
          !
          interface GigabitEthernet0/0
           description LINK-TO-R2-Area0
           ip address 10.0.0.1 255.255.255.252
           ipv6 address 2001:db8:0:12::1/64
           ipv6 ospf 1 area 0
           ip ospf 1 area 0
           no shutdown
          !
          interface GigabitEthernet0/1
           description LINK-TO-R3-Area1
           ip address 10.1.0.1 255.255.255.252
           ipv6 address 2001:db8:1:13::1/64
           ! FAULT #1: wrong OSPFv3 process-id (2 instead of 1) - adjacency will not form
           ipv6 ospf 2 area 1
           ip ospf 1 area 1
           no shutdown
          !
          router ospf 1
           router-id 1.1.1.1
           network 1.1.1.1 0.0.0.0 area 0
           network 10.0.0.0 0.0.0.3 area 0
           network 10.1.0.0 0.0.0.3 area 1
          !
          ipv6 router ospf 1
           router-id 1.1.1.1
          !
          ip domain-name lab.local
          no ip domain-lookup
          !
          line con 0
           logging synchronous
          line vty 0 4
           login local
           transport input ssh
          username admin privilege 15 secret cisco123
          !
          end
