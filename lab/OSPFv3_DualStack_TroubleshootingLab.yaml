lab:
  description: Multi-area OSPFv3 + IPv4/IPv6 dual-stack lab with 6 routers, 3 workstations,
    DHCP, and 10 embedded faults.
  notes: 'Areas: 0 (backbone), 1, 2. R1/R2 in Area 0, R3/R4 in Area 1, R5/R6 in Area
    2. WS1 in Area 1, WS2/WS3 in Area 2. 10 intentional misconfigurations for troubleshooting.'
  title: OSPFv3 Dual-Stack Troubleshooting Lab
  version: 0.3.0
